<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order — Bumi Kayu</title>
<link rel="icon" href="assets/icon-192.png">
<style>
  :root{
    --brown-dark:#5a3620;
    --brown:#8b5e34;
    --brown-nav:#7c4a2d;
    --cream:#faf6ee;
    --sage:#dde6d6;
    --sage-border:#3f5b3f;
    --terracotta:#c07a3e;
    --text:#3a3229;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Georgia', 'Times New Roman', serif;
    background:var(--cream);
    color:var(--text);
  }
  nav{
    background:var(--brown-nav);
    display:flex;
    justify-content:center;
    gap:2.5rem;
    flex-wrap:wrap;
    padding:1.3rem 1rem;
  }
  nav a{
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:1.05rem;
    padding-bottom:6px;
  }
  nav a.active{border-bottom:2px solid #fff;}

  main{max-width:640px;margin:2rem auto;padding:0 1.2rem 3rem;}

  .card{
    background:var(--sage);
    border:1px solid var(--sage-border);
    border-radius:14px;
    padding:2rem;
    margin-bottom:1.8rem;
  }
  .eyebrow{
    color:var(--terracotta);
    font-weight:700;
    letter-spacing:.12em;
    font-size:.85rem;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:.6rem;
    margin-bottom:1.4rem;
  }
  .eyebrow::before{content:"";display:inline-block;width:26px;height:2px;background:var(--terracotta);}

  .row{display:flex;justify-content:space-between;padding:.55rem 0;font-size:1.05rem;}
  .row span:first-child{color:#6b6255;}
  .row span:last-child{font-weight:700;color:var(--brown-dark);}

  select, input[type="number"], input[type="text"]{
    font-family:inherit;
    font-size:1rem;
    padding:.5rem .6rem;
    border-radius:8px;
    border:1px solid var(--sage-border);
    background:#fff;
  }

  button{
    font-family:inherit;
    background:var(--brown-dark);
    color:#fff;
    border:none;
    padding:.85rem 1.6rem;
    border-radius:10px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    margin-top:.5rem;
  }
  button:hover{background:var(--brown);}
  button:disabled{opacity:.6;cursor:not-allowed;}

  .checkmark{
    width:48px;height:48px;border-radius:50%;
    border:2px solid var(--sage-border);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:1.2rem;color:var(--sage-border);
  }
  h1.confirm-title{
    color:var(--brown-dark);
    font-size:1.9rem;
    margin:.2rem 0 1rem;
  }
  .confirm-text{line-height:1.65;font-size:1.05rem;}
  .notice{
    font-family:Arial, sans-serif;
    font-size:.85rem;
    color:#5c6b56;
    margin-top:1rem;
    padding-top:1rem;
    border-top:1px dashed var(--sage-border);
  }
  #confirmCard{display:none;}
</style>
</head>
<body>

<nav>
  <a href="#">Home</a>
  <a href="#">Collection</a>
  <a href="#" class="active">Order</a>
  <a href="#">About Us</a>
  <a href="#">Contact</a>
</nav>

<main>

  <section class="card">
    <div class="eyebrow">Your Selection</div>

    <div class="row">
      <span>Piece</span>
      <select id="pieceInput">
        <option>Coffee Table</option>
        <option>Sofa</option>
        <option>Dining Table</option>
        <option>Cabinet</option>
      </select>
    </div>

    <div class="row">
      <span>Wood finish</span>
      <select id="finishInput">
        <option>Natural Teak</option>
        <option>Walnut Dark</option>
        <option>Oak Honey</option>
      </select>
    </div>

    <div class="row">
      <span>Quantity</span>
      <input type="number" id="qtyInput" value="1" min="1" style="width:70px;">
    </div>

    <div class="row">
      <span>Your name</span>
      <input type="text" id="nameInput" placeholder="e.g. Bagus" style="width:170px;">
    </div>

    <div class="row">
      <span>Estimated total</span>
      <span id="totalDisplay">Rp 5.000.000</span>
    </div>

    <button id="placeOrderBtn">Place Order</button>
  </section>

  <section class="card" id="confirmCard">
    <div class="checkmark">✓</div>
    <h1 class="confirm-title">Order Received!</h1>
    <p class="confirm-text" id="confirmText"></p>
    <p class="notice" id="notifStatus"></p>
  </section>

</main>

<script>
  const PRICE_PER_UNIT = 5000000; // Rp, per piece — adjust per product if needed

  const pieceInput = document.getElementById('pieceInput');
  const finishInput = document.getElementById('finishInput');
  const qtyInput = document.getElementById('qtyInput');
  const nameInput = document.getElementById('nameInput');
  const totalDisplay = document.getElementById('totalDisplay');
  const placeOrderBtn = document.getElementById('placeOrderBtn');
  const confirmCard = document.getElementById('confirmCard');
  const confirmText = document.getElementById('confirmText');
  const notifStatus = document.getElementById('notifStatus');

  function formatRupiah(n){
    return 'Rp ' + n.toLocaleString('id-ID');
  }

  function updateTotal(){
    const qty = Math.max(1, parseInt(qtyInput.value) || 1);
    totalDisplay.textContent = formatRupiah(PRICE_PER_UNIT * qty);
  }
  qtyInput.addEventListener('input', updateTotal);
  updateTotal();

  // ---- Service worker registration ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }

  async function ensureNotificationPermission() {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied') return 'denied';
    return await Notification.requestPermission();
  }

  async function showOrderNotification(piece, finish, name) {
    const permission = await ensureNotificationPermission();

    if (permission !== 'granted') {
      notifStatus.textContent = permission === 'unsupported'
        ? "Your browser doesn't support notifications, but your order was received."
        : "Notifications are turned off, but your order was received — we'll still reach out on WhatsApp.";
      return;
    }

    try {
      const reg = await navigator.serviceWorker.ready;
      reg.showNotification('Order Received!', {
        body: `Your ${piece} in ${finish} is now with our workshop team.`,
        icon: 'assets/icon-192.png',
        badge: 'assets/icon-72.png',
        tag: 'order-received'
      });
      notifStatus.textContent = "We've sent a notification to confirm your order.";
    } catch (err) {
      console.warn('showNotification failed:', err);
      notifStatus.textContent = "Your order was received.";
    }
  }

  placeOrderBtn.addEventListener('click', async () => {
    const piece = pieceInput.value;
    const finish = finishInput.value;
    const name = nameInput.value.trim() || 'there';

    placeOrderBtn.disabled = true;
    placeOrderBtn.textContent = 'Placing order...';

    confirmText.innerHTML =
      `Thank you, <strong>${name}</strong>. Your <strong>${piece}</strong> in <strong>${finish}</strong> finish is now with our workshop team. ` +
      `We'll reach out on WhatsApp within 24 hours to confirm your order and delivery details. Production typically takes about 30 days from confirmation.`;

    confirmCard.style.display = 'block';
    confirmCard.scrollIntoView({behavior:'smooth', block:'start'});

    // This is the key call — fires the system/lock-screen notification
    await showOrderNotification(piece, finish, name);

    placeOrderBtn.textContent = 'Order Placed';
  });
</script>

</body>
</html>
